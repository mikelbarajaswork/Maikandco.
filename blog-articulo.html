        function getPostSlug() {
            const params = new URLSearchParams(window.location.search);
            return params.get("post");
        }

        function renderArticle(post) {
            const meta = document.getElementById("articleMeta");
            const title = document.getElementById("articleTitle");
            const summary = document.getElementById("articleSummary");
            const image = document.getElementById("articleImage");
            const content = document.getElementById("articleContent");

            meta.innerHTML = `
                <span><i class="far fa-folder"></i> ${post.category}</span>
                <span><i class="far fa-calendar"></i> ${post.date}</span>
                <span><i class="far fa-clock"></i> ${post.readTime}</span>
            `;
            title.textContent = post.title;
            summary.textContent = post.summary;
            image.src = post.image;
            image.alt = post.title;
            image.onerror = function() { this.onerror = null; this.src = "img/Profesionales.png"; };

            const keyItems = post.keys.map(item => `<li>${item}</li>`).join("");
            content.innerHTML = `
                <p>Este artículo desarrolla de forma práctica la temática <strong>${post.category.toLowerCase()}</strong> para ayudarte a tomar decisiones con más criterio y menos improvisación. El objetivo es que puedas pasar de la idea a la ejecución con un plan claro.</p>
                <div class="article-highlight"><strong>En resumen:</strong> ${post.summary}</div>
                <h2>Puntos clave</h2>
                <ul>${keyItems}</ul>
                <h2>Cómo aplicarlo en tu caso</h2>
                <p>Empieza definiendo tu objetivo principal: ahorro, estética, confort o rapidez de ejecución. Después, prioriza acciones de mayor impacto y separa claramente lo imprescindible de lo deseable para mantener el control del presupuesto.</p>
                <p>Cuando compares soluciones, evita quedarte solo con el precio inicial. Revisa también durabilidad, mantenimiento, plazos de instalación y posibles costes ocultos. Esta visión completa evita decisiones que luego salen caras.</p>
                <h2>Errores frecuentes que conviene evitar</h2>
                <p>Los fallos más comunes suelen ser tres: no concretar el alcance, no definir hitos de validación y no reservar margen para imprevistos. Corregir esto desde el inicio mejora calidad, tiempos y tranquilidad durante todo el proceso.</p>
                <p>También es clave documentar decisiones por escrito y validar cambios antes de ejecutarlos. Esto reduce malentendidos y hace que cliente y profesional trabajen con expectativas alineadas.</p>
                <h2>Checklist rápida antes de empezar</h2>
                <ul>
                    <li>Objetivo del proyecto definido en una frase.</li>
                    <li>Presupuesto máximo y margen de contingencia establecidos.</li>
                    <li>Cronograma con fases y responsables.</li>
                    <li>Criterios de calidad acordados antes de contratar.</li>
                </ul>
                <a href="blog.html" class="btn btn-primary article-back"><i class="fas fa-arrow-left"></i> Volver al blog</a>
            `;
        }

            const slug = getPostSlug();
            const post = ARTICLES[slug] || ARTICLES["tendencias-reformas-2025"];
            renderArticle(post);
        }

        document.addEventListener("DOMContentLoaded", initArticlePage);
